<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        width: 320px; margin: 0;
        font-family: Inter, -apple-system, system-ui, sans-serif;
        color: #16181d; background: #fff;
      }
      .head { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid #eceef1; }
      .mark { width: 22px; height: 22px; border-radius: 6px; background: #16181d; display: grid; place-items: center; color: #fff; font-size: 12px; }
      .title { font-size: 14px; font-weight: 600; }
      .body { padding: 16px; }
      .status { font-size: 12.5px; color: #6b7280; margin-bottom: 12px; }
      .status b { color: #16181d; font-weight: 600; }
      .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; margin-bottom: 12px; }
      .pill.ok { background: #e7f5ec; color: #1c7c43; }
      .pill.no { background: #fdecec; color: #b42318; }
      label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin: 10px 0 4px; }
      input, textarea {
        width: 100%; font-size: 12.5px; padding: 7px 9px; border: 1px solid #e3e6ea;
        border-radius: 8px; font-family: inherit; color: #16181d;
      }
      textarea { resize: vertical; min-height: 54px; }
      .btn { display: block; width: 100%; text-align: center; text-decoration: none; cursor: pointer;
        padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 600; border: 0; margin-top: 10px; }
      .primary { background: #16181d; color: #fff; }
      .ghost { background: #f3f4f6; color: #16181d; }
      .hint { font-size: 11.5px; color: #9ca3af; margin-top: 12px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="head">
      <div class="mark">✓</div>
      <div class="title">Aftermeet</div>
    </div>
    <div class="body">
      <span class="pill no" id="conn">Not connected</span>
      <div class="status" id="status">Checking for a meeting…</div>

      <button class="btn primary" id="connect">Connect (sign in &amp; get token)</button>

      <label for="token">Connect token</label>
      <textarea id="token" placeholder="Paste the token from the Connect page"></textarea>

      <details>
        <summary style="font-size:11.5px;color:#6b7280;cursor:pointer;margin-top:10px">Advanced: server URLs</summary>
        <label for="appOrigin">Web app origin</label>
        <input id="appOrigin" placeholder="http://localhost:4000" />
        <label for="apiBase">Backend API base</label>
        <input id="apiBase" placeholder="http://localhost:4001" />
      </details>

      <button class="btn ghost" id="save">Save</button>

      <p class="hint">
        Click <b>Connect</b>, sign in to the web app, copy the token, paste it above, and Save.
        Then join a Zoom or Meet call — the floating panel handles the rest.
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
